# =====================================================================
#  Azki Senior DE Task — full local stack
#  Kafka (KRaft) + Schema Registry + Kafka Connect + Kafka-UI
#  MySQL (OLTP users source) + ClickHouse (analytical warehouse)
# =====================================================================
name: azki

services:

  # ─── Kafka broker + controller (single-node KRaft, no ZooKeeper) ───
  #  Using the official apache/kafka image (small, fast to pull). The
  #  Confluent tooling below (Schema Registry, Connect, UI) is broker-
  #  agnostic and talks to this broker over kafka:9092.
  kafka:
    image: apache/kafka:3.8.0
    hostname: kafka
    container_name: azki-kafka
    ports:
      - "29092:29092"   # host access
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ─── Schema Registry (for Avro/JSON-Schema governance) ─────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: azki-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ─── Kafka Connect (Debezium MySQL source + ClickHouse sink) ───────
  connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    hostname: connect
    container_name: azki-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_GROUP_ID: azki-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    command:
      - bash
      - -c
      - |
        echo "Installing connector plugins..."
        confluent-hub install --no-prompt debezium/debezium-connector-mysql:2.5.4 || true
        confluent-hub install --no-prompt clickhouse/clickhouse-kafka-connect:v1.2.5 || true
        echo "Starting Kafka Connect..."
        /etc/confluent/docker/run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 20

  # ─── Kafka UI (visibility into topics, consumers, connect) ─────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: azki-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: azki
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://connect:8083"
      DYNAMIC_CONFIG_ENABLED: "true"

  # ─── MySQL: the "production" users table (OLTP source) ─────────────
  mysql:
    image: mysql:8.0
    container_name: azki-mysql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW           # required for Debezium CDC
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ingestion/mysql:/docker-entrypoint-initdb.d:ro
      - ./data/users.csv:/seed/users.csv:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ─── ClickHouse: analytical warehouse ──────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: azki-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ─── Spark (Part 3 bonus: backfill). Only starts with `--profile spark` ─
  spark:
    image: apache/spark:3.5.3
    container_name: azki-spark
    profiles: ["spark"]
    depends_on:
      clickhouse:
        condition: service_healthy
    user: root
    volumes:
      - ./spark:/opt/app
      - ./data:/opt/data:ro
    working_dir: /opt/app

  # ─── Prefect orchestration (Part 3). Server + UI + scheduled monitoring
  #     flow, all in one container. Only starts with `--profile orchestration`.
  #     Talks to the stack over the compose network (CH_HOST/KAFKA_BOOTSTRAP),
  #     so the same flows run here or on the host. UI at http://localhost:4200.
  prefect:
    image: prefecthq/prefect:3-python3.11
    container_name: azki-prefect
    profiles: ["orchestration"]
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_API_URL: "http://127.0.0.1:4200/api"
      CH_HOST: "clickhouse"
      CH_PORT: "8123"
      KAFKA_BOOTSTRAP: "kafka:9092"
    ports:
      - "4200:4200"   # Prefect UI
    volumes:
      - ./:/app
    working_dir: /app
    command:
      - bash
      - -c
      - |
        pip install --no-cache-dir confluent-kafka >/dev/null
        prefect server start --host 0.0.0.0 &
        until curl -sf http://127.0.0.1:4200/api/health >/dev/null; do sleep 2; done
        echo "Prefect server up — serving azki-monitoring every 5 min"
        python orchestration/flows.py serve

volumes:
  kafka-data:
  mysql-data:
  clickhouse-data:
